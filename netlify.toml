[build]
  base = "frontend"
  command = "rm -f package-lock.json && npm install --no-audit --no-fund && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NETLIFY_USE_YARN = "false"

# Fallback for blog posts created after build (output:"export" can't generate
# their static HTML). Netlify only applies this when no static file exists at
# the requested path, so build-time-known slugs still serve their own HTML.
[[redirects]]
  from = "/blog/*"
  to = "/blog/post.html"
  status = 200

# Same fallback for product pages created in the admin after the last deploy.
# Netlify only applies this when no static file exists, so products present at
# build time serve their own HTML; newer slugs land on the client fallback,
# which reads the slug from the URL and fetches the product at runtime.
[[redirects]]
  from = "/products/*"
  to = "/products/fallback.html"
  status = 200
